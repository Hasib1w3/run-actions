              code=$(curl -s -o /dev/null -w "%{http_code}" -m 60 -H "Authorization: Bearer $token" "$url" 2>/dev/null || echo "000")
            else
              code=$(curl -s -o /dev/null -w "%{http_code}" -m 60 "$url" 2>/dev/null || echo "000")
            fi
            
